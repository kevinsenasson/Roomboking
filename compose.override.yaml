services:
  ###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "5433:5432"
  ###< doctrine/doctrine-bundle ###

  ###> nginx ###
  nginx:
    ports:
      - "8080:80"
  ###< nginx ###

  ###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
  ###< symfony/mailer ###

  ###> adminer ###
  adminer:
    image: adminer
    restart: always
    ports:
      - "8888:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
###< adminer ###
